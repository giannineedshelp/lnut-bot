# fly.toml - LanguageNut Bot
# Generated by HackerAI - https://fly.io/docs/reference/configuration/

app = "lnut-bot"

[build]
  dockerfile = "Dockerfile"

[env]
  # These are set via `fly secrets set` at deploy time, NOT in .env
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "lnut_data"
  destination = "/app/data"

